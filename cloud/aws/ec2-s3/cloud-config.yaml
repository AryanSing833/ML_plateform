# Cloud Deployment Configuration
# Generated for AWS AWS EC2 & S3

provider: aws
service: ec2-s3
project_name: my-test-project
framework: pytorch

# Service-specific configuration
ec2_s3:
  region: us-east-1
  instance_type: t3.medium
  ami_type: amazon-linux-2

# Project configuration
project:
  name: my-test-project
  framework: pytorch
  task_type: classification
  deployment: kubernetes
  monitoring: none

# Deployment settings
deployment:
  auto_scale: true
  health_check: true
  logging: true
  monitoring: False
